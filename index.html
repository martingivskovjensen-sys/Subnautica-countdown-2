<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subnautica 2 Countdown</title>
    <meta name="description" content="Countdown to the release of Subnautica 2.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Confetti script -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="water-background"></div>
    <div class="bubbles" id="bubbles-container"></div>
    
    <main class="container glass">
        <h1 class="glow-text">Subnautica 2</h1>
        <p class="subtitle">Deploying to Planet 4546B...</p>
        
        <div id="countdown" class="countdown">
            <div class="time-box">
                <span id="days" class="number">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-box">
                <span id="hours" class="number">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-box">
                <span id="minutes" class="number">00</span>
                <span class="label">Minutes</span>
            </div>
            <div class="time-box">
                <span id="seconds" class="number">00</span>
                <span class="label">Seconds</span>
            </div>
        </div>

        <div id="launch-message" class="hidden">
            <h2 class="glow-text success-text">Welcome to the Unknown!</h2>
            <p>Subnautica 2 is now available in Early Access.</p>
            <a href="steam://rungameid/1962700" class="cyber-btn" style="margin-top: 2rem; display: inline-block; text-decoration: none;">
                Launch Subnautica 2
            </a>
        </div>

        <button id="preview-btn" class="cyber-btn">
            Preview Launch Event
        </button>
    </main>

    <script src="script.js"></script>
</body>
</html>
